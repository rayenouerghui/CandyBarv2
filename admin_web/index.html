<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CandyBarV2 — Display Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent:  #0078D4;
      --bg:      #f3f3f3;
      --surface: #ffffff;
      --border:  #e0e0e0;
      --text:    #1a1a1a;
      --sub:     #666;
      --radius:  10px;
    }

    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px 16px;
    }

    header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }
    header .dot {
      width: 12px; height: 12px; border-radius: 50%;
      background: #ccc;
      transition: background .3s;
    }
    header .dot.on  { background: #52c41a; }
    header .dot.off { background: #ff4d4f; }
    header h1 { font-size: 20px; font-weight: 600; }
    header small { font-size: 12px; color: var(--sub); margin-left: auto; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 16px;
    }
    .card h2 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 14px;
      color: var(--sub);
      text-transform: uppercase;
      letter-spacing: .05em;
    }

    /* queue number */
    .num-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .num-row input[type=number] {
      width: 100px;
      font-size: 28px;
      font-weight: 700;
      text-align: center;
      border: 2px solid var(--border);
      border-radius: 8px;
      padding: 6px;
      color: var(--accent);
    }
    .num-row button {
      font-size: 22px;
      width: 44px; height: 44px;
      border: none; border-radius: 8px;
      background: var(--accent); color: #fff;
      cursor: pointer;
    }
    .num-row button:active { opacity: .8; }

    /* theme grid */
    .theme-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }
    .theme-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border: 2px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      cursor: pointer;
      font-size: 14px;
      transition: border-color .2s;
    }
    .theme-btn.active { border-color: var(--accent); }
    .theme-btn .swatch {
      width: 18px; height: 18px; border-radius: 50%;
      flex-shrink: 0;
    }

    /* colour swatches */
    .swatch-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .swatch-pick {
      width: 32px; height: 32px; border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: border-color .2s, transform .1s;
    }
    .swatch-pick:hover    { transform: scale(1.15); }
    .swatch-pick.selected { border-color: #333; }

    /* slider */
    .slider-row { display: flex; align-items: center; gap: 12px; }
    .slider-row input[type=range] { flex: 1; accent-color: var(--accent); }
    .slider-row span { width: 40px; text-align: right; font-size: 13px; color: var(--sub); }

    /* text inputs */
    textarea, input[type=text] {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 14px;
      font-family: inherit;
      resize: vertical;
    }
    textarea:focus, input[type=text]:focus {
      outline: none;
      border-color: var(--accent);
    }

    /* layout buttons */
    .layout-row { display: flex; gap: 8px; }
    .layout-btn {
      flex: 1;
      padding: 8px;
      border: 2px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      cursor: pointer;
      font-size: 13px;
      transition: border-color .2s;
    }
    .layout-btn.active { border-color: var(--accent); color: var(--accent); font-weight: 600; }

    /* toast */
    #toast {
      position: fixed;
      bottom: 20px; left: 50%; transform: translateX(-50%);
      background: #333; color: #fff;
      padding: 8px 18px; border-radius: 20px;
      font-size: 13px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .3s;
    }
    #toast.show { opacity: 1; }

    label { display: block; font-size: 13px; color: var(--sub); margin-bottom: 6px; }
  </style>
</head>
<body>

<header>
  <div class="dot" id="conn_dot"></div>
  <h1>Display Admin</h1>
  <small id="conn_label">Connecting…</small>
</header>

<!-- Queue Number -->
<div class="card">
  <h2>Queue Number</h2>
  <div class="num-row">
    <button onclick="adjustNumber(-1)">−</button>
    <input type="number" id="num_input" value="042" min="0" max="999" />
    <button onclick="adjustNumber(1)">+</button>
    <button onclick="sendNumber()" style="width:auto;padding:0 16px;font-size:14px;">Send</button>
  </div>
</div>

<!-- Preset Themes -->
<div class="card">
  <h2>Preset Theme</h2>
  <div class="theme-grid" id="theme_grid">
    <button class="theme-btn active" data-theme="Corporate"   onclick="setTheme(this)"><span class="swatch" style="background:#0078D4"></span>Corporate</button>
    <button class="theme-btn"        data-theme="DarkPremium" onclick="setTheme(this)"><span class="swatch" style="background:#FFD700"></span>Dark Premium</button>
    <button class="theme-btn"        data-theme="Restaurant"  onclick="setTheme(this)"><span class="swatch" style="background:#C0392B"></span>Restaurant</button>
    <button class="theme-btn"        data-theme="Minimal"     onclick="setTheme(this)"><span class="swatch" style="background:#2ECC71"></span>Minimal</button>
  </div>
</div>

<!-- Layout -->
<div class="card">
  <h2>Layout</h2>
  <div class="layout-row">
    <button class="layout-btn active" data-layout="Classic"  onclick="setLayout(this)">Classic</button>
    <button class="layout-btn"        data-layout="Centered" onclick="setLayout(this)">Centered</button>
    <button class="layout-btn"        data-layout="Split"    onclick="setLayout(this)">Split</button>
  </div>
</div>

<!-- Accent Color -->
<div class="card">
  <h2>Accent Color</h2>
  <div class="swatch-row" id="accent_swatches">
    <div class="swatch-pick selected" style="background:#0078D4" data-color="#0078D4" onclick="setAccent(this)"></div>
    <div class="swatch-pick"          style="background:#C0392B" data-color="#C0392B" onclick="setAccent(this)"></div>
    <div class="swatch-pick"          style="background:#2ECC71" data-color="#2ECC71" onclick="setAccent(this)"></div>
    <div class="swatch-pick"          style="background:#9B59B6" data-color="#9B59B6" onclick="setAccent(this)"></div>
    <div class="swatch-pick"          style="background:#E67E22" data-color="#E67E22" onclick="setAccent(this)"></div>
    <div class="swatch-pick"          style="background:#1ABC9C" data-color="#1ABC9C" onclick="setAccent(this)"></div>
  </div>
</div>

<!-- Font Size -->
<div class="card">
  <h2>Number Size</h2>
  <div class="slider-row">
    <input type="range" id="font_slider" min="40" max="160" step="4" value="72"
           oninput="document.getElementById('font_val').textContent=this.value+'px'; publish('display/fontSize', this.value)" />
    <span id="font_val">72px</span>
  </div>
</div>

<!-- Banner Text -->
<div class="card">
  <h2>Banner Text</h2>
  <textarea id="banner_input" rows="2"
    placeholder="Promo / info text…">Welcome — please wait for your number to be called</textarea>
  <button onclick="sendBanner()"
    style="margin-top:8px;padding:8px 18px;background:var(--accent);color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px;">
    Update Banner
  </button>
</div>

<!-- Facility Name -->
<div class="card">
  <h2>Facility Name</h2>
  <input type="text" id="facility_input" value="CandyBar Service Centre" />
  <button onclick="sendFacility()"
    style="margin-top:8px;padding:8px 18px;background:var(--accent);color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px;">
    Update Name
  </button>
</div>

<div id="toast"></div>

<!-- Paho MQTT JS client (loaded from CDN) -->
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script>
  // ── MQTT connection (WebSocket on port 8083 — EMQX default WS port) ──
  const BROKER_WS = `ws://${location.hostname}:8083/mqtt`
  const client = mqtt.connect(BROKER_WS, { clientId: 'admin-web-' + Math.random().toString(16).slice(2) })

  const dot   = document.getElementById('conn_dot')
  const label = document.getElementById('conn_label')

  client.on('connect', () => {
    dot.className = 'dot on'
    label.textContent = 'Connected to EMQX'
    toast('Connected')
  })
  client.on('error', e => {
    dot.className = 'dot off'
    label.textContent = 'MQTT error: ' + e.message
  })
  client.on('close', () => {
    dot.className = 'dot off'
    label.textContent = 'Disconnected'
  })

  function publish(topic, payload) {
    if (client.connected) {
      client.publish(topic, String(payload))
      toast('Sent: ' + topic)
    } else {
      toast('Not connected to MQTT broker')
    }
  }

  // ── Controls ───────────────────────────────────────────────────────────
  function adjustNumber(delta) {
    const el = document.getElementById('num_input')
    el.value = Math.max(0, Math.min(999, parseInt(el.value || 0) + delta))
  }
  function sendNumber() {
    const val = String(parseInt(document.getElementById('num_input').value) || 0).padStart(3, '0')
    publish('display/currentNumber', val)
  }

  function setTheme(btn) {
    document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'))
    btn.classList.add('active')
    publish('display/theme', btn.dataset.theme)
  }

  function setLayout(btn) {
    document.querySelectorAll('.layout-btn').forEach(b => b.classList.remove('active'))
    btn.classList.add('active')
    publish('display/layoutType', btn.dataset.layout)
  }

  function setAccent(el) {
    document.querySelectorAll('.swatch-pick').forEach(s => s.classList.remove('selected'))
    el.classList.add('selected')
    publish('display/accentColor', el.dataset.color)
  }

  function sendBanner()   { publish('display/bannerText',   document.getElementById('banner_input').value) }
  function sendFacility() { publish('display/facilityName', document.getElementById('facility_input').value) }

  // ── Toast ──────────────────────────────────────────────────────────────
  let _toastTimer
  function toast(msg) {
    const el = document.getElementById('toast')
    el.textContent = msg
    el.classList.add('show')
    clearTimeout(_toastTimer)
    _toastTimer = setTimeout(() => el.classList.remove('show'), 2000)
  }
</script>
</body>
</html>
