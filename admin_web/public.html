<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>Now Serving</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #0b0d10;
      --accent: #0078D4;
      --text:   rgba(255,255,255,0.95);
      --text2:  rgba(255,255,255,0.42);
      --text3:  rgba(255,255,255,0.32);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: "Inter", "SF Pro Display", system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      overflow: hidden;
    }

    /* Noise texture overlay */
    body::before {
      content: "";
      position: fixed; inset: 0;
      background-image: url('/uploads/noise_texture.png');
      background-repeat: repeat;
      opacity: 0.035;
      pointer-events: none;
      z-index: 0;
    }

    /* Radial top glow */
    body::after {
      content: "";
      position: fixed;
      top: -30%;
      left: 50%;
      transform: translateX(-50%);
      width: 80vw;
      height: 60vw;
      max-width: 600px;
      background: radial-gradient(ellipse, rgba(255,255,255,0.04) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .accent-glow {
      position: fixed;
      bottom: -10%;
      right: -10%;
      width: 50vw;
      height: 50vw;
      max-width: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--accent-glow, rgba(0,120,212,0.12)) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
      transition: background 0.6s ease;
    }

    .card {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 48px 40px 40px;
      max-width: 360px;
      width: 90%;
    }

    .label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text2);
      margin-bottom: 20px;
    }

    .number {
      font-family: "DM Mono", "Roboto Mono", "SF Mono", ui-monospace, monospace;
      font-size: clamp(80px, 22vw, 160px);
      font-weight: 500;
      line-height: 1;
      color: var(--text);
      letter-spacing: -0.02em;
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
    .number.changing {
      opacity: 0.3;
      transform: scale(0.92);
    }

    .underline {
      margin: 14px auto 0;
      height: 3px;
      width: 48px;
      border-radius: 2px;
      background: var(--accent);
      transition: background 0.6s ease;
    }

    /* Next-up strip (Split layout) */
    .next-up {
      margin-top: 32px;
      border-top: 1px solid rgba(255,255,255,0.08);
      padding-top: 20px;
      display: none;
    }
    .next-up.visible { display: block; }
    .next-up-label {
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--text3);
      margin-bottom: 12px;
    }
    .next-up-list {
      display: flex;
      justify-content: center;
      gap: 12px;
    }
    .next-up-item {
      font-family: "DM Mono", "Roboto Mono", monospace;
      font-size: 22px;
      font-weight: 400;
      color: var(--text);
    }
    .next-up-item:nth-child(2) { opacity: 0.62; }
    .next-up-item:nth-child(3) { opacity: 0.42; }
    .next-up-item:nth-child(4) { opacity: 0.28; }

    .facility {
      margin-top: 28px;
      font-size: 13px;
      color: var(--text3);
    }

    .status-dot {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #555;
      transition: background 0.3s ease;
      z-index: 10;
    }
    .status-dot.on  { background: #22c55e; }
    .status-dot.off { background: #555; }
  </style>
</head>
<body>
  <div class="accent-glow" id="accent_glow"></div>

  <div class="card">
    <div class="label">Now Serving</div>
    <div class="number" id="number">—</div>
    <div class="underline" id="underline"></div>

    <div class="next-up" id="next_up_section">
      <div class="next-up-label">Next Up</div>
      <div class="next-up-list" id="next_up_list"></div>
    </div>

    <div class="facility" id="facility"></div>
  </div>

  <div class="status-dot" id="status_dot" title="Live connection"></div>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script>
  // Load initial state from server
  async function loadState() {
    try {
      const r = await fetch('/api/state');
      const d = await r.json();
      applyState(d);
    } catch(e) { /* offline — MQTT will update when available */ }
  }

  function applyState(d) {
    setNumber(d.currentNumber || '—');
    if (d.accentColor) setAccent(d.accentColor);
    if (d.facilityName) document.getElementById('facility').textContent = d.facilityName;
    if (d.layoutType === 'Split' && d.nextUp && d.nextUp.length) {
      showNextUp(d.nextUp);
    } else {
      document.getElementById('next_up_section').classList.remove('visible');
    }
  }

  function setNumber(val) {
    const el = document.getElementById('number');
    el.classList.add('changing');
    setTimeout(() => {
      el.textContent = val;
      el.classList.remove('changing');
    }, 160);
  }

  function setAccent(hex) {
    document.documentElement.style.setProperty('--accent', hex);
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    document.documentElement.style.setProperty('--accent-glow', `rgba(${r},${g},${b},0.12)`);
    document.getElementById('underline').style.background = hex;
  }

  function showNextUp(nums) {
    const sec = document.getElementById('next_up_section');
    const list = document.getElementById('next_up_list');
    list.innerHTML = nums.slice(0,4).map(n => `<span class="next-up-item">${n}</span>`).join('');
    sec.classList.add('visible');
  }

  // MQTT live updates
  const BROKER = `ws://${location.hostname}:8083/mqtt`;
  const client = mqtt.connect(BROKER, {
    clientId: 'public-' + Math.random().toString(16).slice(2),
    reconnectPeriod: 3000,
  });

  const dot = document.getElementById('status_dot');

  client.on('connect', () => {
    dot.className = 'status-dot on';
    client.subscribe('display/#');
  });
  client.on('close',      () => { dot.className = 'status-dot off'; });
  client.on('reconnect',  () => { dot.className = 'status-dot off'; });

  client.on('message', (topic, message) => {
    const key     = topic.replace('display/', '');
    const payload = message.toString();
    if (key === 'currentNumber') setNumber(payload);
    if (key === 'accentColor')   setAccent(payload);
    if (key === 'facilityName')  document.getElementById('facility').textContent = payload;
    if (key === 'layoutType' || key === 'nextUp') {
      // Reload full state to keep next-up visibility consistent
      loadState();
    }
  });

  loadState();
</script>
</body>
</html>
